<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Exam Questions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">Question Management System</h2>
        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Question Text</th>
                            <th>Correct Answer</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for q in questions %}
                        <tr>
                            <td>{{ q.id }}</td>
                            <td>{{ q.text }}</td>
                            <td><span class="badge bg-success">{{ q.correct_answer }}</span></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                <div class="text-center mt-4">
                    <a href="/exam" class="btn btn-secondary">Go to Exam Page</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
