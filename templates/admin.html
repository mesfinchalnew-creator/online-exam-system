<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 40px; }
        .admin-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        h1 { color: #1e3c72; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #2a5298; color: white; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>የተማሪዎች ፈተና ውጤት ዝርዝር</h1>
        <table>
            <tr>
                <th>ተራ ቁጥር</th>
                <th>የተማሪ ስም</th>
                <th>የተመዘገበ ውጤት</th>
            </tr>
            {% for result in results %}
            <tr>
                <td>{{ result.id }}</td>
                <td>{{ result.student_name }}</td>
                <td><strong style="color: green;">{{ result.score }}%</strong></td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <a href="/login" style="text-decoration: none; color: #2a5298;">← ወደ ሎጊን ተመለስ</a>
    </div>
</body>
</html>
