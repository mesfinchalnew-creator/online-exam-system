<!DOCTYPE html>
<html>
<head>
    <title>Online Exam</title>
</head>
<body style="font-family: Arial; padding: 20px;">
    <h2>AMU Online Exam</h2>
    <form action="/submit_exam" method="POST">
        {% for q in questions %}
        <div style="margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px;">
            <p><strong>{{ loop.index }}. {{ q.text }}</strong></p>
            <label><input type="radio" name="{{ q.id }}" value="A"> A. {{ q.option_a }}</label><br>
            <label><input type="radio" name="{{ q.id }}" value="B"> B. {{ q.option_b }}</label><br>
            <label><input type="radio" name="{{ q.id }}" value="C"> C. {{ q.option_c }}</label><br>
            <label><input type="radio" name="{{ q.id }}" value="D"> D. {{ q.option_d }}</label>
        </div>
        {% endfor %}
        <button type="submit" style="background: green; color: white; padding: 10px 20px;">Submit Exam</button>
    </form>
</body>
</html>
