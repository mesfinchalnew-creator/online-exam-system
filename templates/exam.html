<!DOCTYPE html>
<html>
<head>
    <title>Online Exam</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .exam-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .question { margin-bottom: 20px; }
        button { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="exam-container">
        <h2>እንኳን ደህና መጣህ { { name } }!</h2>
        <p>እባክህ የሚከተሉትን ጥያቄዎች መልስ፡</p>
        
        <form action="/exam/{{ name }}" method="POST">
            <div class="question">
                <p>1. የኢትዮጵያ ዋና ከተማ ማን ይባላል?</p>
                <input type="radio" name="q1" value="A"> አዳማ <br>
                <input type="radio" name="q1" value="B"> አዲስ አበባ <br>
            </div>
            
            <div class="question">
                <p>2. Arba Minch University የሚገኘው በየትኛው ክልል ነው?</p>
                <input type="radio" name="q2" value="A"> ደቡብ ኢትዮጵያ <br>
                <input type="radio" name="q2" value="B"> አማራ <br>
            </div>

            <button type="submit">ፈተናውን ጨርስ (Submit)</button>
        </form>
    </div>
</body>
</html>
