<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMU Online Exam - Faculty of Computing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .exam-container { max-width: 800px; margin-top: 50px; }
        .card { border: none; border-radius: 15px; }
        .question-text { font-weight: 600; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container exam-container">
    <div class="text-center mb-5">
        <h2 class="text-primary fw-bold">Arba Minch University</h2>
        <p class="text-muted">Faculty of Computing and Software Engineering</p>
        <hr>
    </div>

    <form action="/submit" method="POST">
        {% for q in questions %}
        <div class="card shadow-sm mb-4">
            <div class="card-body p-4">
                <p class="question-text text-dark">{{ loop.index }}. {{ q.text }}</p>
                
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="{{ q.id }}" id="q{{ q.id }}a" value="A" required>
                    <label class="form-check-label" for="q{{ q.id }}a">{{ q.option_a }}</label>
                </div>
                
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="{{ q.id }}" id="q{{ q.id }}b" value="B">
                    <label class="form-check-label" for="q{{ q.id }}b">{{ q.option_b }}</label>
                </div>
                
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="{{ q.id }}" id="q{{ q.id }}c" value="C">
                    <label class="form-check-label" for="q{{ q.id }}c">{{ q.option_c }}</label>
                </div>
                
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="{{ q.id }}" id="q{{ q.id }}d" value="D">
                    <label class="form-check-label" for="q{{ q.id }}d">{{ q.option_d }}</label>
                </div>
            </div>
        </div>
        {% endfor %}

        <div class="text-center mb-5">
            <button type="submit" class="btn btn-primary btn-lg px-5 shadow">Submit Exam</button>
        </div>
    </form>
</div>

<footer class="text-center py-4 text-muted">
    <small>&copy; 2026 Arba Minch University - Online Exam System</small>
</footer>

</body>
</html>
