<!DOCTYPE html>
<html>
<head>
    <title>AMU Online Exam</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 800px;">
    <h2 class="text-center text-primary mb-4">Network & Security Exam</h2>
    <form action="/submit" method="POST">
        {% for q in questions %}
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <p class="fw-bold">{{ loop.index }}. {{ q.text }}</p>
                <div class="form-check"><input type="radio" name="{{q.id}}" value="A" required> A. {{q.option_a}}</div>
                <div class="form-check"><input type="radio" name="{{q.id}}" value="B"> B. {{q.option_b}}</div>
                <div class="form-check"><input type="radio" name="{{q.id}}" value="C"> C. {{q.option_c}}</div>
                <div class="form-check"><input type="radio" name="{{q.id}}" value="D"> D. {{q.option_d}}</div>
            </div>
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100 btn-lg mb-5">Submit Exam</button>
    </form>
</div>
</body>
</html>
