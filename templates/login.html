<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <style>
        body { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h2 { color: #2a5298; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button {
            background-color: #28a745;
            border: none;
            padding: 12px 25px;
            color: white;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        button:hover { background-color: #218838; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Student Login</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Enter Full Name" required>
            <button type="submit">Start Exam</button>
        </form>
    </div>
</body>
</html>
