<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMU Student Online Exam System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* የተፈጥሮ ምስሉን እንደ ዳራ ለመጠቀም */
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.3)), 
                        url("{{ url_for('static', filename='nature_bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* የጠፋው ዋና ጽሁፍ እዚህ ጋር ተስተካክሏል */
        .main-title-container {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(30, 58, 138, 0.85); /* ጥቁር ሰማያዊ ዳራ ጽሁፉ እንዲታይ */
            padding: 20px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .main-title-container h1 { 
            font-size: 26px; 
            color: white; 
            margin: 0; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .main-title-container p { 
            font-size: 16px; 
            color: #ffd700; 
            margin: 5px 0 0 0;
            font-weight: 600;
        }

        .main-content {
            display: flex;
            gap: 25px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo-circle {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo-circle img { width: 75px; }
        
        .login-card h2 { color: white; margin: 0; font-size: 22px; font-weight: bold; }
        .login-card .sub-text { color: #ffd700; margin-bottom: 25px; font-size: 13px; font-weight: bold; }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.95);
            box-sizing: border-box;
            font-size: 15px;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            transition: 0.3s;
        }
        .login-btn:hover { background: #2563eb; transform: scale(1.03); }

        .info-box {
            background: rgba(255, 255, 255, 0.95);
            color: #1e3a8a;
            padding: 20px;
            border-radius: 20px;
            width: 150px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .info-box i { font-size: 28px; margin-bottom: 10px; display: block; }
        .info-box span { font-size: 13px; font-weight: bold; }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="main-title-container">
        <h1>Arba Minch University</h1>
        <p>Student Online Exam System</p>
    </div>

    <div class="main-content">
        <div class="info-box">
            <i class="fas fa-user-lock"></i>
            <span>Secure Access Control</span>
        </div>

        <div class="login-card">
            <div class="logo-circle">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="AMU Logo">
            </div>
            <h2>STUDENT LOGIN</h2>
            <div class="sub-text">FACULTY OF COMPUTING & SE</div>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Student ID / Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="login-btn">ACCESS EXAM</button>
            </form>
        </div>

        <div class="info-box">
            <i class="fas fa-laptop-code"></i>
            <span>CNS-611 Exam Portal</span>
        </div>
    </div>

</body>
</html>
