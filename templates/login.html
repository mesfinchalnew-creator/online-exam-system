<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AMU Exam Login</title>
    <style>
        /* ያንተን መሰረታዊ ዲዛይን በመጠበቅ ትንሽ ማሳመሪያዎች ተጨምረዋል */
        body { 
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); /* ዳራውን ይበልጥ እንዲያምር አደረግነው */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            width: 380px; 
            text-align: center;
            transition: transform 0.3s;
        }
        .login-card:hover { transform: translateY(-5px); } /* ትንሽ ሞሽን እንዲኖረው */
        
        h2 { color: #1e3a8a; margin-bottom: 5px; font-weight: 800; }
        .sub-title { color: #666; margin-bottom: 25px; font-size: 14px; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border: 1px solid #e1e4e8; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
            background: #f8fafc;
        }
        input:focus {
            outline: none;
            border-color: #1e3a8a;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: #1e3a8a; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: 0.3s; 
            margin-top: 10px;
        }
        button:hover { 
            background: #152c66; 
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2);
        }
        
        .fcse-footer { 
            font-size: 12px; 
            color: #1e3a8a; 
            margin-top: 25px; 
            font-weight: 600;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>AMU Portal Login</h2>
        <div class="sub-title">Online Examination System</div>
        
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Access Exam</button>
        </form>
        
        <div class="fcse-footer">
            Institute of Technology<br>
            Faculty of Computing & Software Engineering
        </div>
    </div>
</body>
</html>
