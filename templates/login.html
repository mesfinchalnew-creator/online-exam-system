<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMU Student Online Exam System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url("{{ url_for('static', filename='background_new.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-section h1 { font-size: 28px; margin: 10px 0; font-weight: 700; }
        .header-section p { font-size: 16px; color: #cbd5e1; }

        .main-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        /* የመረጃ ካርዶች (Info Cards) */
        .info-card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 20px;
            border-radius: 15px;
            width: 220px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .info-card:hover { transform: translateY(-5px); }
        .info-card i { font-size: 30px; color: #1e3a8a; display: block; margin-bottom: 10px; }
        .info-card h4 { font-size: 14px; margin: 0; line-height: 1.4; }

        /* የሎግኢን ካርድ */
        .login-card {
            background: rgba(45, 45, 45, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .amu-logo { width: 90px; margin-bottom: 15px; background: white; padding: 8px; border-radius: 50%; }
        
        h2 { color: white; margin: 0; font-size: 22px; }
        .sub-title { color: #ffd700; margin-bottom: 25px; font-size: 12px; font-weight: bold; }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: #f1f5f9;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #2563eb; }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="header-section">
        <img src="{{ url_for('static', filename='logo.png') }}" class="amu-logo" style="width: 70px; background: none;">
        <h1>Arba Minch University Student Online Exam System</h1>
        <p>Faculty of Computing & Software Engineering</p>
    </div>

    <div class="main-container">
        <div class="info-card">
            <i class="fas fa-user-shield"></i>
            <h4>Verify Identity (2FA Setup)</h4>
        </div>

        <div class="login-card">
            <img src="{{ url_for('static', filename='logo.png') }}" class="amu-logo" alt="AMU Logo">
            <h2>AMU PORTAL LOGIN</h2>
            <div class="sub-title">ONLINE EXAMINATION SYSTEM</div>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">ACCESS EXAM</button>
            </form>
        </div>

        <div class="info-card">
            <i class="fas fa-file-signature"></i>
            <h4>View/Take CNS-611 Final Exam</h4>
        </div>

        <div class="info-card">
            <i class="fas fa-book-open"></i>
            <h4>Access "FCSE: AMU" Exam Guide</h4>
        </div>
    </div>

</body>
</html>
