<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMU Student Online Exam System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* የመረጥከው ዳራ እዚህ ይገባል */
            background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), 
                        url("{{ url_for('static', filename='background_new.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
        }

        .login-card {
            background: rgba(45, 45, 45, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .amu-logo { 
            width: 110px; 
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 50%;
        }
        
        h2 { color: white; margin: 0; font-weight: 800; font-size: 24px; letter-spacing: 1px; }
        .sub-title { color: #ffd700; margin-bottom: 30px; font-size: 13px; font-weight: bold; text-transform: uppercase; }

        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 10px;
            border: none;
            background: #f1f5f9;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 17px;
            margin-top: 10px;
            transition: 0.3s ease;
        }

        button:hover { background: #2563eb; transform: scale(1.02); }

        .footer-text {
            color: #cbd5e1;
            font-size: 11px;
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{{ url_for('static', filename='logo.png') }}" class="amu-logo" alt="AMU Logo">
        
        <h2>AMU PORTAL LOGIN</h2>
        <div class="sub-title">ONLINE EXAMINATION SYSTEM</div>
        
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">ACCESS EXAM</button>
        </form>
        
        <div class="footer-text">
            Arba Minch University<br>
            Institute of Technology<br>
            Faculty of Computing & Software Engineering
        </div>
    </div>
</body>
</html>
