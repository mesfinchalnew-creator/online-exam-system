<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMU Student Online Exam System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* ምስሉ ጥርት እንዲል እና ሙሉ ሀውልቱ እንዲታይ containment እንጠቀማለን */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)), 
                        url("{{ url_for('static', filename='monument.jpg') }}") no-repeat center center;
            background-size: contain; /* cover የሚለውን ወደ contain ቀይሬያለሁ */
            background-color: #333; /* ምስሉ ያላለቀበት ቦታ ጥቁር እንዲሆን */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header-section {
            text-align: center;
            margin-bottom: 25px;
            z-index: 2;
        }

        .header-section h1 { font-size: 26px; color: white; margin: 5px 0; font-weight: 800; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }
        .header-section p { font-size: 14px; color: #ffd700; font-weight: 600; text-transform: uppercase; }

        .main-container {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
            width: 100%;
            z-index: 2;
        }

        /* የመረጃ ካርዶች (በትንሽ ፊደል) */
        .info-card {
            background: rgba(255, 255, 255, 0.9);
            color: #1e3a8a;
            padding: 20px;
            border-radius: 15px;
            width: 170px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-bottom: 4px solid #1e3a8a;
            transition: 0.3s;
        }
        .info-card i { font-size: 28px; margin-bottom: 12px; display: block; }
        .info-card h4 { font-size: 13px; margin: 0; font-weight: 700; }

        /* የሎግኢን ካርድ */
        .login-card {
            background: rgba(25, 25, 25, 0.95);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            width: 340px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .amu-logo-circle {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            padding: 4px;
        }
        .amu-logo-circle img { width: 65px; }
        
        h2 { color: white; margin: 0; font-size: 20px; font-weight: 800; }
        .sub-title { color: #ffd700; margin-bottom: 20px; font-size: 11px; font-weight: bold; }

        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            background: #f1f5f9;
            box-sizing: border-box;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background: #2563eb; transform: translateY(-2px); }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="header-section">
        <h1>Arba Minch University Student Online Exam System</h1>
        <p>Faculty of Computing & Software Engineering</p>
    </div>

    <div class="main-container">
        <div class="info-card">
            <i class="fas fa-fingerprint"></i>
            <h4>Verify Identity (2FA Setup)</h4>
        </div>

        <div class="login-card">
            <div class="amu-logo-circle">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
            </div>
            <h2>AMU PORTAL LOGIN</h2>
            <div class="sub-title">ONLINE EXAMINATION SYSTEM</div>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">ACCESS EXAM</button>
            </form>
        </div>

        <div class="info-card">
            <i class="fas fa-file-contract"></i>
            <h4>View/Take CNS-611 Exam</h4>
        </div>
    </div>

</body>
</html>
