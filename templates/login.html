<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMU Student Online Exam System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* ምስሉን በቀጥታ ከውጪ ሊንክ እንዲያነበው አድርጌዋለሁ */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url("https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Arba_Minch_University_Main_Gate.jpg/1200px-Arba_Minch_University_Main_Gate.jpg") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .amu-logo { width: 80px; margin-bottom: 10px; }
        
        h2 { color: white; margin: 0; font-weight: 800; font-size: 22px; }
        .sub-title { color: #ffd700; margin-bottom: 25px; font-size: 14px; font-weight: bold; }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover { background: #2563eb; }

        .footer-text {
            color: white;
            font-size: 12px;
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/8a/Arba_Minch_University_logo.png/220px-Arba_Minch_University_logo.png" class="amu-logo">
        <h2>AMU PORTAL LOGIN</h2>
        <div class="sub-title">ONLINE EXAMINATION SYSTEM</div>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">ACCESS EXAM</button>
        </form>
        <div class="footer-text">
            Arba Minch University<br>
            Institute of Technology<br>
            Faculty of Computing & Software Engineering
        </div>
    </div>
</body>
</html>
