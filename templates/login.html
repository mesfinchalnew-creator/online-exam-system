<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMU Student Online Exam System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            /* ምስሉ ጥርት ብሎ እንዲታይ background-size: cover እና ዝቅተኛ opacity ተጠቅሜያለሁ */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url("{{ url_for('static', filename='background_new.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8); /* ጽሁፉ በምስሉ ላይ ጎልቶ እንዲታይ */
        }

        .header-section h1 { font-size: 32px; color: white; margin: 10px 0; font-weight: 800; }
        .header-section p { font-size: 18px; color: #ffd700; font-weight: 600; }

        .main-container {
            display: flex;
            gap: 25px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
            width: 100%;
        }

        /* የመረጃ ካርዶች - ምስሉን እንዳይሸፍኑ በከፊል ግልጽ ተደርገዋል */
        .info-card {
            background: rgba(255, 255, 255, 0.9);
            color: #1e3a8a;
            padding: 25px;
            border-radius: 20px;
            width: 200px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: 0.3s;
            border: 2px solid #1e3a8a;
        }
        .info-card i { font-size: 35px; margin-bottom: 15px; display: block; }
        .info-card h4 { font-size: 15px; margin: 0; font-weight: 700; }

        /* የሎግኢን ካርድ - ጥርት ያለ ጥቁር ዳራ */
        .login-card {
            background: rgba(30, 30, 30, 0.95);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
            width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .amu-logo-circle {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .amu-logo-circle img { width: 80px; }
        
        h2 { color: white; margin: 0; font-size: 24px; letter-spacing: 1px; }
        .sub-title { color: #ffd700; margin-bottom: 30px; font-size: 13px; font-weight: bold; }

        input {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
            box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3);
        }
        button:hover { background: #2563eb; transform: translateY(-3px); }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="header-section">
        <h1>Arba Minch University Student Online Exam System</h1>
        <p>Faculty of Computing & Software Engineering</p>
    </div>

    <div class="main-container">
        <div class="info-card">
            <i class="fas fa-user-check"></i>
            <h4>Verify Identity<br>(2FA Setup)</h4>
        </div>

        <div class="login-card">
            <div class="amu-logo-circle">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="AMU Logo">
            </div>
            <h2>AMU PORTAL LOGIN</h2>
            <div class="sub-title">ONLINE EXAMINATION SYSTEM</div>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">ACCESS EXAM</button>
            </form>
        </div>

        <div class="info-card">
            <i class="fas fa-laptop-code"></i>
            <h4>View/Take<br>CNS-611 Exam</h4>
        </div>
    </div>

</body>
</html>
