<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMU Student Online Exam System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* ዳራው ጥርት ያለ የአርባ ምንጭ ዩኒቨርሲቲ በር ምስል እንዲሆን */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url("{{ url_for('static', filename='amu_gate.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #343a40; 
        }

        .login-card {
            background: rgba(45, 45, 45, 0.95); /* ካርዱ ጥቁር ሆኖ ምስሉን በትንሹ እንዲያሳይ */
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .amu-logo { 
            width: 130px; 
            margin-bottom: 20px;
            /* የሎጎው ዳራ ነጭ ከሆነ እንዲያምርበት */
            background: white;
            padding: 10px;
            border-radius: 15px;
        }
        
        h2 { color: white; margin: 0; font-weight: 800; font-size: 26px; letter-spacing: 1px; }
        .sub-title { color: #ffd700; margin-bottom: 35px; font-size: 14px; font-weight: bold; text-transform: uppercase; }

        input {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border-radius: 12px;
            border: none;
            background: #f8fafc;
            box-sizing: border-box;
            font-size: 16px;
            color: #1e293b;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
            transition: 0.3s ease;
        }

        button:hover { 
            background: #2563eb; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4);
        }

        .footer-text {
            color: #cbd5e1;
            font-size: 12px;
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{{ url_for('static', filename='logo.png') }}" class="amu-logo" alt="AMU Logo">
        
        <h2>AMU PORTAL LOGIN</h2>
        <div class="sub-title">ONLINE EXAMINATION SYSTEM</div>
        
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">ACCESS EXAM</button>
        </form>
        
        <div class="footer-text">
            Arba Minch University<br>
            Institute of Technology<br>
            Faculty of Computing & Software Engineering
        </div>
    </div>
</body>
</html>
