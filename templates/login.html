<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMU Student Online Exam System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* ምስሉን ዳውንሎድ ማድረግ ካልተቻለ በቀጥታ ከሊንክ እንዲያነበው ተደርጓል */
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), 
                        url("https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Arba_Minch_University_Main_Gate.jpg/1200px-Arba_Minch_University_Main_Gate.jpg") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); /* ለዘመናዊ መልክ (Glassmorphism) */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s;
        }

        .login-card:hover { transform: translateY(-5px); }

        .amu-logo {
            width: 80px;
            margin-bottom: 15px;
        }

        h2 { 
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
        }

        .sub-title { 
            color: #ffd700; /* የወርቅ ቀለም ለአርባ ምንጭ ዩኒቨርሲቲ ክብር */
            margin-bottom: 25px; 
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        button:hover {
            background: #2563eb;
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4);
        }

        .fcse-footer {
            font-size: 12px;
            color: #ffffff;
            margin-top: 25px;
            font-weight: 600;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/8a/Arba_Minch_University_logo.png/220px-Arba_Minch_University_logo.png" class="amu-logo" alt="AMU Logo">
        
        <h2>AMU PORTAL LOGIN</h2>
        <div class="sub-title">Online Examination System</div>
        
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Access Exam</button>
        </form>
        
        <div class="fcse-footer">
            Arba Minch University<br>
            Institute of Technology<br>
            Faculty of Computing & Software Engineering
        </div>
    </div>
</body>
</html>
