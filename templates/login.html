<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMU Student Online Exam System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* አዲሱን ምስል እዚህ ጋር በትክክል እናስገባለን */
            background: linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.2)), 
                        url("{{ url_for('static', filename='nature_bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header-bg {
            background: rgba(30, 58, 138, 0.7);
            padding: 10px 40px;
            border-radius: 50px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .header-bg h1 { color: white; margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .header-bg p { color: #ffd700; margin: 0; font-size: 14px; font-weight: bold; text-align: center; }

        .main-layout {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .logo-area {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo-area img { width: 75px; }

        h2 { color: white; margin: 0; font-size: 22px; font-weight: 900; }
        .tagline { color: #ffd700; font-size: 12px; margin-bottom: 25px; font-weight: bold; }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            background: white;
            font-size: 15px;
            box-sizing: border-box;
        }

        .btn-access {
            width: 100%;
            padding: 15px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-access:hover { background: #2563eb; transform: translateY(-3px); }

        .side-info {
            background: white;
            padding: 20px;
            border-radius: 20px;
            width: 160px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .side-info i { font-size: 30px; color: #1e3a8a; margin-bottom: 10px; display: block; }
        .side-info span { font-size: 13px; font-weight: bold; color: #333; }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="header-bg">
        <h1>Arba Minch University</h1>
        <p>Institute of Technology</p>
    </div>

    <div class="main-layout">
        <div class="side-info">
            <i class="fas fa-user-shield"></i>
            <span>Secure Access Control</span>
        </div>

        <div class="login-box">
            <div class="logo-area">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="AMU Logo">
            </div>
            <h2>STUDENT LOGIN</h2>
            <div class="tagline">ONLINE EXAMINATION SYSTEM</div>
            
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Student ID / Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn-access">ACCESS EXAM</button>
            </form>
        </div>

        <div class="side-info">
            <i class="fas fa-book-reader"></i>
            <span>CNS-611 Exam Portal</span>
        </div>
    </div>

</body>
</html>
