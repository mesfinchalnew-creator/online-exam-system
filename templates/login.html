<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMU Student Online Exam System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* አዲሱን የሀውልት ምስል እዚህ እንጠቀማለን */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.5)), 
                        url("{{ url_for('static', filename='monument.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            z-index: 2;
        }

        .header-section h1 { 
            font-size: 34px; 
            color: white; 
            margin: 10px 0; 
            font-weight: 800;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.8);
        }

        .header-section p { 
            font-size: 18px; 
            color: #ffd700; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-container {
            display: flex;
            gap: 30px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
            width: 100%;
            z-index: 2;
        }

        /* የመረጃ ካርዶች */
        .info-card {
            background: rgba(255, 255, 255, 0.95);
            color: #1e3a8a;
            padding: 25px;
            border-radius: 20px;
            width: 180px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border-bottom: 5px solid #1e3a8a;
            transition: 0.3s;
        }
        .info-card i { font-size: 35px; margin-bottom: 15px; display: block; }
        .info-card h4 { font-size: 14px; margin: 0; font-weight: 700; }

        /* የሎግኢን ካርድ */
        .login-card {
            background: rgba(25, 25, 25, 0.92);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .amu-logo-circle {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            padding: 5px;
        }
        .amu-logo-circle img { width: 75px; }
        
        h2 { color: white; margin: 0; font-size: 22px; font-weight: 800; }
        .sub-title { color: #ffd700; margin-bottom: 25px; font-size: 12px; font-weight: bold; }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            background: #f8fafc;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 17px;
            margin-top: 10px;
        }
        button:hover { background: #2563eb; transform: translateY(-2px); }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="header-section">
        <h1>Arba Minch University Student Online Exam System</h1>
        <p>Faculty of Computing & Software Engineering</p>
    </div>

    <div class="main-container">
        <div class="info-card">
            <i class="fas fa-id-card-alt"></i>
            <h4>Verify Identity (2FA Setup)</h4>
        </div>

        <div class="login-card">
            <div class="amu-logo-circle">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
            </div>
            <h2>AMU PORTAL LOGIN</h2>
            <div class="sub-title">ONLINE EXAMINATION SYSTEM</div>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">ACCESS EXAM</button>
            </form>
        </div>

        <div class="info-card">
            <i class="fas fa-file-alt"></i>
            <h4>View/Take CNS-611 Final Exam</h4>
        </div>

        <div class="info-card">
            <i class="fas fa-university"></i>
            <h4>Access "FCSE" Exam Guide</h4>
        </div>
    </div>

</body>
</html>
