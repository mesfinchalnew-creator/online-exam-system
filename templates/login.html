<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMU Student Online Exam System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* ምስሉን ከ static ፎልደር ለመጥራት url_for ተጠቅሜያለሁ */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url("{{ url_for('static', filename='amu_gate.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50; /* ምስሉ ባይመጣ እንኳ ዳራው እንዲያምር */
        }

        .login-card {
            background: rgba(45, 45, 45, 0.85); 
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .amu-logo { 
            width: 85px; 
            margin-bottom: 15px; 
            background: white; 
            border-radius: 50%; 
            padding: 5px;
        }
        
        h2 { color: white; margin: 0; font-weight: 800; font-size: 24px; letter-spacing: 1px; }
        .sub-title { color: #ffd700; margin-bottom: 30px; font-size: 14px; font-weight: bold; text-transform: uppercase; }

        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 8px;
            border: none;
            background: #f1f5f9;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 17px;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { background: #2563eb; transform: scale(1.02); }

        .footer-text {
            color: #cbd5e1;
            font-size: 12px;
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/8a/Arba_Minch_University_logo.png/220px-Arba_Minch_University_logo.png" class="amu-logo" alt="AMU Logo">
        
        <h2>AMU PORTAL LOGIN</h2>
        <div class="sub-title">ONLINE EXAMINATION SYSTEM</div>
        
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">ACCESS EXAM</button>
        </form>
        
        <div class="footer-text">
            Arba Minch University<br>
            Institute of Technology<br>
            Faculty of Computing & Software Engineering
        </div>
    </div>
</body>
</html>
