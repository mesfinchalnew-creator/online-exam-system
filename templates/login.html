<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMU Student Online Exam System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* አዲሱን የተፈጥሮ ምስል እዚህ እንጠቀማለን */
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.3)), 
                        url("{{ url_for('static', filename='monument.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.4); /* ጽሁፉ እንዲታይ የኋላ ሻዶ */
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        .header-section h1 { 
            font-size: 28px; 
            color: white; 
            margin: 5px 0; 
            font-weight: 800;
        }

        .header-section p { 
            font-size: 15px; 
            color: #ffd700; 
            margin: 0;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .main-container {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        /* የሎግኢን ካርድ - ትንሽ ግልጽ (Glassmorphism) */
        .login-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 340px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .amu-logo-circle {
            width: 85px;
            height: 85px;
            background: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .amu-logo-circle img { width: 70px; }
        
        h2 { color: white; margin: 0; font-size: 22px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .sub-title { color: #ffd700; margin-bottom: 25px; font-size: 12px; font-weight: bold; }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
            font-size: 15px;
            color: #333;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background: #2563eb; transform: scale(1.02); }

        /* ትናንሽ ካርዶች */
        .info-card {
            background: rgba(255, 255, 255, 0.9);
            color: #1e3a8a;
            padding: 15px;
            border-radius: 15px;
            width: 150px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .info-card i { font-size: 24px; margin-bottom: 8px; display: block; }
        .info-card h4 { font-size: 12px; margin: 0; }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="header-section">
        <h1>Arba Minch University</h1>
        <p>Faculty of Computing & Software Engineering</p>
    </div>

    <div class="main-container">
        <div class="info-card">
            <i class="fas fa-shield-alt"></i>
            <h4>Secure Login</h4>
        </div>

        <div class="login-card">
            <div class="amu-logo-circle">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="AMU Logo">
            </div>
            <h2>STUDENT LOGIN</h2>
            <div class="sub-title">ONLINE EXAMINATION SYSTEM</div>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">ACCESS EXAM</button>
            </form>
        </div>

        <div class="info-card">
            <i class="fas fa-graduation-cap"></i>
            <h4>CNS-611 Exam</h4>
        </div>
    </div>

</body>
</html>
