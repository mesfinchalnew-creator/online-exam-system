<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Result - AMU</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .result-card {
            max-width: 600px;
            margin: 80px auto;
            border-radius: 15px;
            border: none;
        }
        .score-text {
            font-size: 3.5rem; /* መጠኑን ከቀድሞው ትንሽ ቀነስ አድርገነዋል */
            color: #0d6efd;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card result-card shadow-lg text-center p-5">
            <div class="card-body">
                <h1 class="text-success mb-4">Congratulations {{ session['user'] }}!</h1>
                <hr>
                
                <p class="h4 mt-4 text-secondary">You Answered:</p>
                <h2 class="fw-bold">{{ score }} out of {{ total }} Correctly</h2>
                
                <div class="my-4">
                    <div class="score-text fw-bold">{{ percentage }}%</div>
                </div>

                <p class="text-muted mb-4">Your result has been officially recorded in the system.</p>
                
                <div class="d-grid gap-2">
                    <a href="/logout" class="btn btn-primary btn-lg shadow-sm">Log Out</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
