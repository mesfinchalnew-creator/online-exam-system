<!DOCTYPE html>
<html>
<head>
    <title>Exam Result</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5 text-center">
        <div class="card shadow p-5">
            <h1 class="text-success">Congratulations mesfin!</h1>
            <hr>
            <h3 class="my-4">You Answered: {{ score }} out of {{ total }} Correctly</h3>
            <div class="display-1 fw-bold text-primary mb-4">Score: {{ percentage }}%</div>
            <p class="text-muted">Your result has been officially recorded.</p>
            <a href="/logout" class="btn btn-primary btn-lg px-5 mt-3">Log Out</a>
        </div>
    </div>
</body>
</html>
